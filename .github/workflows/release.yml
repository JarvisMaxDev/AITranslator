name: Release App

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0
  workflow_dispatch: # Allow manual triggering

jobs:
  build-and-release:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          brew install xcodegen create-dmg

      - name: Generate Xcode Project
        run: xcodegen generate
        
      - name: Build and Archive
        run: |
          # Build without requiring local development certificates
          xcodebuild -project AITranslator.xcodeproj \
            -scheme AITranslator \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build \
            SYMROOT="$(pwd)/build"
            
      - name: Verify build output
        run: ls -la build/Release/

      - name: Create DMG
        run: |
          cd build/Release
          # Since the app uses an ad-hoc signature, we just package it as is.
          # The user may need to run `xattr -cr /Applications/AI\ Translator.app` on their Mac
          # to clear the quarantine flag, or right-click -> Open.
          create-dmg \
            --volname "AI Translator" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "AI Translator.app" 175 190 \
            --hide-extension "AI Translator.app" \
            --app-drop-link 425 190 \
            "AITranslator.dmg" \
            "AI Translator.app"
            
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/Release/AITranslator.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
