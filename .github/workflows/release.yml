name: Release App

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force release even without feat/fix commits"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          CURRENT_VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Analyze commits since last tag
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if [ -z "$COMMITS" ]; then
            echo "📭 No new commits since $LATEST_TAG"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "📋 Commits since $LATEST_TAG:"
          echo "$COMMITS"

          # Determine bump type
          BUMP="none"
          HAS_BREAKING=false
          HAS_FEAT=false
          HAS_FIX=false

          while IFS= read -r msg; do
            if echo "$msg" | grep -qiE "^[a-z]+(\(.+\))?!:" || echo "$msg" | grep -qi "BREAKING CHANGE"; then
              HAS_BREAKING=true
            fi
            if echo "$msg" | grep -qE "^feat(\(.+\))?:"; then
              HAS_FEAT=true
            fi
            if echo "$msg" | grep -qE "^(fix|perf|refactor)(\(.+\))?:"; then
              HAS_FIX=true
            fi
          done <<< "$COMMITS"

          if [ "$HAS_BREAKING" = true ]; then
            BUMP="major"
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$HAS_FEAT" = true ]; then
            BUMP="minor"
            MINOR=$((MINOR + 1)); PATCH=0
          elif [ "$HAS_FIX" = true ]; then
            BUMP="patch"
            PATCH=$((PATCH + 1))
          fi

          FORCE="${{ inputs.force_release }}"
          if [ "$BUMP" = "none" ] && [ "$FORCE" != "true" ]; then
            echo "⏭️  No releasable commits (only docs/ci/chore/style/test). Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$BUMP" = "none" ] && [ "$FORCE" = "true" ]; then
            BUMP="patch"
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "🚀 $BUMP bump: $CURRENT_VERSION → $NEW_VERSION (build $BUILD_NUMBER)"

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        if: steps.version.outputs.should_release == 'true'
        run: |
          LATEST_TAG="${{ steps.version.outputs.latest_tag }}"
          TAG="${{ steps.version.outputs.tag }}"
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%H %s" 2>/dev/null || git log --pretty=format:"%H %s")

          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed in $TAG"
            echo ""

            FEATS=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ feat(\(.+\))?:" | sed 's/^[a-f0-9]* feat\(.*\)\?: /- /' || true)
            if [ -n "$FEATS" ]; then
              echo "### ✨ Features"
              echo "$FEATS"
              echo ""
            fi

            FIXES=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ fix(\(.+\))?:" | sed 's/^[a-f0-9]* fix\(.*\)\?: /- /' || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            PERFS=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ perf(\(.+\))?:" | sed 's/^[a-f0-9]* perf\(.*\)\?: /- /' || true)
            if [ -n "$PERFS" ]; then
              echo "### ⚡ Performance"
              echo "$PERFS"
              echo ""
            fi

            REFS=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ refactor(\(.+\))?:" | sed 's/^[a-f0-9]* refactor\(.*\)\?: /- /' || true)
            if [ -n "$REFS" ]; then
              echo "### ♻️ Refactoring"
              echo "$REFS"
              echo ""
            fi

            echo "---"
            echo "**Install:** \`brew tap JarvisMaxDev/tap && brew install --cask aitranslator\`"
            echo "**Update:** \`brew upgrade --cask aitranslator\`"

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create git tag
        id: create_tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Check if tag already exists on remote
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "⚠️ Tag $TAG already exists on remote — skipping release"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "JarvisMaxDev"
          git config user.email "jarvis@aitranslator.dev"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "tag_created=true" >> "$GITHUB_OUTPUT"

      - name: Import code signing certificate
        if: steps.version.outputs.should_release == 'true' && steps.create_tag.outputs.tag_created == 'true'
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security add-trusted-cert -d -r trustRoot -p codeSign -k build.keychain /tmp/cert.p12 2>/dev/null || true
          rm /tmp/cert.p12
          security find-identity -v build.keychain

      - name: Install XcodeGen
        if: steps.version.outputs.should_release == 'true' && steps.create_tag.outputs.tag_created == 'true'
        run: brew install xcodegen

      - name: Generate Xcode Project
        if: steps.version.outputs.should_release == 'true' && steps.create_tag.outputs.tag_created == 'true'
        run: xcodegen generate

      - name: Build Release
        if: steps.version.outputs.should_release == 'true' && steps.create_tag.outputs.tag_created == 'true'
        run: |
          xcodebuild -project AITranslator.xcodeproj \
            -scheme AITranslator \
            -configuration Release \
            CODE_SIGN_IDENTITY="AITranslator Dev" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            clean build \
            SYMROOT="$(pwd)/build"

      - name: Verify version in app
        if: steps.version.outputs.should_release == 'true' && steps.create_tag.outputs.tag_created == 'true'
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" \
            "build/Release/AI Translator.app/Contents/Info.plist")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" \
            "build/Release/AI Translator.app/Contents/Info.plist")
          echo "✅ App version: $VERSION (build $BUILD)"

      - name: Create DMG
        if: steps.version.outputs.should_release == 'true' && steps.create_tag.outputs.tag_created == 'true'
        run: |
          cd build/Release
          mkdir -p dmg_staging
          cp -R "AI Translator.app" dmg_staging/
          ln -sf /Applications dmg_staging/Applications
          hdiutil create -volname "AI Translator" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            AITranslator.dmg
          rm -rf dmg_staging
          ls -lh AITranslator.dmg
          shasum -a 256 AITranslator.dmg

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true' && steps.create_tag.outputs.tag_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "AI Translator ${{ steps.version.outputs.tag }}"
          body: ${{ steps.changelog.outputs.body }}
          files: build/Release/AITranslator.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        if: steps.version.outputs.should_release == 'true' && steps.create_tag.outputs.tag_created == 'true'
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(shasum -a 256 build/Release/AITranslator.dmg | awk '{print $1}')
          echo "📦 Updating Cask to v${VERSION} (sha256: ${SHA256})"

          git clone https://${TAP_TOKEN}@github.com/JarvisMaxDev/homebrew-tap.git /tmp/tap
          cd /tmp/tap

          cat > Casks/aitranslator.rb << CASKEOF
          cask "aitranslator" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/JarvisMaxDev/AITranslator/releases/download/v#{version}/AITranslator.dmg"
            name "AI Translator"
            desc "Native macOS AI translator with global hotkey"
            homepage "https://github.com/JarvisMaxDev/AITranslator"

            depends_on macos: ">= :sonoma"

            app "AI Translator.app"

            zap trash: [
              "~/.aitranslator",
              "~/Library/Preferences/com.aitranslator.app.plist",
            ]
          end
          CASKEOF

          git config user.name "JarvisMaxDev"
          git config user.email "jarvis.max.dev@proton.me"
          git add Casks/aitranslator.rb
          git commit -m "chore: bump aitranslator to v${VERSION}"
          git push
          echo "✅ Homebrew Cask updated to v${VERSION}"
