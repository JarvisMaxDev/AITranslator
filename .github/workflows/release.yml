name: Release App

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_release:
        description: "Force release even without feat/fix commits"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          CURRENT_VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Analyze commits since last tag
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if [ -z "$COMMITS" ]; then
            echo "📭 No new commits since $LATEST_TAG"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "📋 Commits since $LATEST_TAG:"
          echo "$COMMITS"

          # Determine bump type
          BUMP="none"
          HAS_BREAKING=false
          HAS_FEAT=false
          HAS_FIX=false

          while IFS= read -r msg; do
            # Check for breaking changes
            if echo "$msg" | grep -qiE "^[a-z]+(\(.+\))?!:" || echo "$msg" | grep -qi "BREAKING CHANGE"; then
              HAS_BREAKING=true
            fi
            # Check for features
            if echo "$msg" | grep -qE "^feat(\(.+\))?:"; then
              HAS_FEAT=true
            fi
            # Check for fixes and other releasable types
            if echo "$msg" | grep -qE "^(fix|perf|refactor)(\(.+\))?:"; then
              HAS_FIX=true
            fi
          done <<< "$COMMITS"

          if [ "$HAS_BREAKING" = true ]; then
            BUMP="major"
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$HAS_FEAT" = true ]; then
            BUMP="minor"
            MINOR=$((MINOR + 1)); PATCH=0
          elif [ "$HAS_FIX" = true ]; then
            BUMP="patch"
            PATCH=$((PATCH + 1))
          fi

          FORCE="${{ inputs.force_release }}"
          if [ "$BUMP" = "none" ] && [ "$FORCE" != "true" ]; then
            echo "⏭️  No releasable commits (only docs/ci/chore/style/test). Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$BUMP" = "none" ] && [ "$FORCE" = "true" ]; then
            BUMP="patch"
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "🚀 $BUMP bump: $CURRENT_VERSION → $NEW_VERSION (build $BUILD_NUMBER)"

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        if: steps.version.outputs.should_release == 'true'
        run: |
          LATEST_TAG="${{ steps.version.outputs.latest_tag }}"
          TAG="${{ steps.version.outputs.tag }}"
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%H %s" 2>/dev/null || git log --pretty=format:"%H %s")

          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed in $TAG"
            echo ""

            # Features
            FEATS=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ feat(\(.+\))?:" | sed 's/^[a-f0-9]* feat\(.*\)\?: /- /' || true)
            if [ -n "$FEATS" ]; then
              echo "### ✨ Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ fix(\(.+\))?:" | sed 's/^[a-f0-9]* fix\(.*\)\?: /- /' || true)
            if [ -n "$FIXES" ]; then
              echo "### � Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Performance
            PERFS=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ perf(\(.+\))?:" | sed 's/^[a-f0-9]* perf\(.*\)\?: /- /' || true)
            if [ -n "$PERFS" ]; then
              echo "### ⚡ Performance"
              echo "$PERFS"
              echo ""
            fi

            # Refactors
            REFS=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ refactor(\(.+\))?:" | sed 's/^[a-f0-9]* refactor\(.*\)\?: /- /' || true)
            if [ -n "$REFS" ]; then
              echo "### ♻️ Refactoring"
              echo "$REFS"
              echo ""
            fi

            echo "---"
            echo "**Install:** \`brew tap JarvisMaxDev/tap && brew install --cask aitranslator\`"
            echo "**Update:** \`brew upgrade --cask aitranslator\`"

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create git tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "JarvisMaxDev"
          git config user.email "jarvis@aitranslator.dev"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Import code signing certificate
        if: steps.version.outputs.should_release == 'true'
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD="ci-build-$(date +%s)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Set keychain search list and allow codesign access
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Verify identity is available
          security find-identity -v "$KEYCHAIN_PATH"
          echo "✅ Certificate imported"

      - name: Install XcodeGen
        if: steps.version.outputs.should_release == 'true'
        run: brew install xcodegen

      - name: Generate Xcode Project
        if: steps.version.outputs.should_release == 'true'
        run: xcodegen generate

      - name: Build Release
        if: steps.version.outputs.should_release == 'true'
        run: |
          xcodebuild -project AITranslator.xcodeproj \
            -scheme AITranslator \
            -configuration Release \
            CODE_SIGN_IDENTITY="AITranslator Dev" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            clean build \
            SYMROOT="$(pwd)/build"

      - name: Verify version in app
        if: steps.version.outputs.should_release == 'true'
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" \
            "build/Release/AI Translator.app/Contents/Info.plist")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" \
            "build/Release/AI Translator.app/Contents/Info.plist")
          echo "✅ App version: $VERSION (build $BUILD)"

      - name: Create DMG
        if: steps.version.outputs.should_release == 'true'
        run: |
          cd build/Release
          mkdir -p dmg_staging
          cp -R "AI Translator.app" dmg_staging/
          ln -sf /Applications dmg_staging/Applications
          hdiutil create -volname "AI Translator" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            AITranslator.dmg
          rm -rf dmg_staging
          ls -lh AITranslator.dmg
          shasum -a 256 AITranslator.dmg

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "AI Translator ${{ steps.version.outputs.tag }}"
          body: ${{ steps.changelog.outputs.body }}
          files: build/Release/AITranslator.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_SHA=$(shasum -a 256 build/Release/AITranslator.dmg | awk '{print $1}')
          export DMG_SHA

          python3 - <<'PYEOF'
          import json, base64, urllib.request, os

          token = os.environ["GH_TOKEN"]
          version = os.environ["APP_VERSION"]
          dmg_sha = os.environ["DMG_SHA"]
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github+json"}

          cask = f'''cask "aitranslator" do
            version "{version}"
            sha256 "{dmg_sha}"

            url "https://github.com/JarvisMaxDev/AITranslator/releases/download/v#{{version}}/AITranslator.dmg"
            name "AI Translator"
            desc "Native macOS AI translator with global hotkey"
            homepage "https://github.com/JarvisMaxDev/AITranslator"

            depends_on macos: ">= :sonoma"

            app "AI Translator.app"

            zap trash: [
              "~/.aitranslator",
              "~/Library/Preferences/com.aitranslator.app.plist",
            ]
          end
          '''

          req = urllib.request.Request(
              "https://api.github.com/repos/JarvisMaxDev/homebrew-tap/contents/Casks/aitranslator.rb",
              headers=headers
          )
          file_sha = json.loads(urllib.request.urlopen(req).read())["sha"]

          payload = json.dumps({
              "message": f"chore: bump aitranslator to v{version}",
              "content": base64.b64encode(cask.encode()).decode(),
              "sha": file_sha
          }).encode()

          req = urllib.request.Request(
              "https://api.github.com/repos/JarvisMaxDev/homebrew-tap/contents/Casks/aitranslator.rb",
              data=payload,
              headers={**headers, "Content-Type": "application/json"},
              method="PUT"
          )
          resp = urllib.request.urlopen(req)
          print(f"✅ Homebrew Cask updated to v{version} (HTTP {resp.status})")
          PYEOF
