name: Release App

on:
  push:
    tags:
      - "v*" # Trigger on tags like v1.0.0
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # For workflow_dispatch — use latest tag or fallback
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION="${LATEST_TAG#v}"
          fi
          # Build number from git commit count
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION (build $BUILD_NUMBER)"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild -project AITranslator.xcodeproj \
            -scheme AITranslator \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            clean build \
            SYMROOT="$(pwd)/build"

      - name: Verify version in app
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" \
            "build/Release/AI Translator.app/Contents/Info.plist")
          BUILD=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" \
            "build/Release/AI Translator.app/Contents/Info.plist")
          echo "✅ App version: $VERSION (build $BUILD)"

      - name: Create DMG
        run: |
          cd build/Release
          mkdir -p dmg_staging
          cp -R "AI Translator.app" dmg_staging/
          ln -sf /Applications dmg_staging/Applications
          hdiutil create -volname "AI Translator" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            AITranslator.dmg
          rm -rf dmg_staging
          ls -lh AITranslator.dmg
          shasum -a 256 AITranslator.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "AI Translator v${{ steps.version.outputs.version }}"
          files: build/Release/AITranslator.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
