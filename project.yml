name: AITranslator
options:
  minimumXcodeGenVersion: "2.38"
  bundleIdPrefix: com.aitranslator
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  AITranslator:
    type: application
    platform: macOS
    sources:
      - path: AITranslator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aitranslator.app
        INFOPLIST_FILE: AITranslator/Resources/Info.plist
        DEVELOPMENT_TEAM: GM23JF485V
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: AI Translator
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
    entitlements:
      path: AITranslator/Resources/AITranslator.entitlements
      properties:
        com.apple.security.app-sandbox: false

  AITranslatorTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AITranslatorTests
    dependencies:
      - target: AITranslator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aitranslator.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AI Translator.app/Contents/MacOS/AI Translator"
        BUNDLE_LOADER: "$(TEST_HOST)"
