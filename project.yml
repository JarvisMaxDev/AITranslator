name: AITranslator
options:
  minimumXcodeGenVersion: "2.38"
  bundleIdPrefix: com.aitranslator
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  AITranslator:
    type: application
    platform: macOS
    sources:
      - path: AITranslator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aitranslator.app
        INFOPLIST_FILE: AITranslator/Resources/Info.plist
        DEVELOPMENT_TEAM: GM23JF485V
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: AI Translator
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
    entitlements:
      path: AITranslator/Resources/AITranslator.entitlements
      properties:
        com.apple.security.app-sandbox: false
